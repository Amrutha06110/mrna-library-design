# ─────────────────────────────────────────────────────────────────────────────
# mRNA Library Design — configuration file
# All CLI flags override their corresponding entry here.
# ─────────────────────────────────────────────────────────────────────────────

# Input directories (relative to project root)
utr5_dir:  data/utr5
orf_dir:   data/orf
utr3_dir:  data/utr3

# Output directory
output_dir: outputs

# ── Assembly ─────────────────────────────────────────────────────────────────
# Cap structure added at the 5' end of each construct.
# Options: m7G | cap1 | arca | none
cap: m7G

# Kozak context inserted between 5'UTR and ORF start codon.
# Options: strong (GCCACCAUGG) | moderate (ACCAUGG) | none
kozak: strong

# Poly-A tail length in nucleotides (set to 0 to omit)
polya_length: 100

# Maximum number of combinations to generate.
# Total possible = |utr5| × |orf| × |utr3|. Use null for no cap.
max_combinations: 1000

# ── Scoring ──────────────────────────────────────────────────────────────────
# Weights must sum to 1.0 (they are normalised automatically if not).
scoring_weights:
  cai:              0.20   # Codon Adaptation Index (geometric mean)
  mfe_stability:    0.15   # Minimum Free Energy structural stability
  gc_content:       0.10   # GC content optimality (target ~50–55%)
  utr_access:       0.12   # UTR ribosome / factor accessibility (motif-aware)
  codon_pair:       0.10   # Codon pair bias (comprehensive CPB table)
  u_depletion:      0.08   # Uridine depletion (innate immune evasion)
  cpg_depletion:    0.05   # CpG depletion (TLR9 avoidance)
  translation_eff:  0.10   # Translation efficiency (5'UTR k-mer model)
  codon_ramp:       0.05   # 5' ORF codon ramp (co-translational folding)
  codon_diversity:  0.05   # Codon diversity (autocorrelation avoidance)

# ── Barcoding ─────────────────────────────────────────────────────────────────
barcoding:
  # mode: dna | peptide | quart
  mode: dna

  # Barcode length in nucleotides
  length: 16

  # Minimum pairwise Hamming distance between any two barcodes
  min_hamming: 3

  # GC content bounds for barcode sequences
  gc_min: 0.40
  gc_max: 0.60

# ── Codon Optimizer ───────────────────────────────────────────────────────────
optimizer:
  # method: max_cai (deterministic) | weighted (stochastic) | balanced (multi-obj)
  method: balanced

  # External tool. Options: builtin | vaxpress | lineardesign
  # Make sure the chosen tool is installed and on PATH.
  tool: builtin

# ── Quality Control ──────────────────────────────────────────────────────────
qc:
  cpg_max_density: 0.02        # Max CpG dinucleotide density
  uridine_max_fraction: 0.25   # Max uridine fraction in ORF
  max_homopolymer_run: 5       # Max consecutive identical nucleotides
  gc_window: 50                # Sliding window size for local GC check
  local_gc_min: 0.25           # Min GC in any window
  local_gc_max: 0.80           # Max GC in any window

# ── Filtering (post-scoring) ─────────────────────────────────────────────────
filters:
  min_composite_score: 0.0   # Drop constructs below this score
  gc_min: 0.40               # Discard if full-sequence GC < this
  gc_max: 0.70               # Discard if full-sequence GC > this
